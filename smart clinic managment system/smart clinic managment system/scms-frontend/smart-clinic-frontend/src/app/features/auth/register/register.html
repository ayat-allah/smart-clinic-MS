<div class="register-page">
  <div class="register-side">
    <div class="side-content">
      <h2>Join Smart Clinic</h2>
      <p>Create your account and get started today</p>
      <div class="side-features">
        <div class="side-feature">✅ Easy Appointment Booking</div>
        <div class="side-feature">📋 Medical History Tracking</div>
        <div class="side-feature">🔔 Smart Reminders</div>
        <div class="side-feature">💊 Digital Prescriptions</div>
      </div>
    </div>
  </div>

  <div class="register-card">
    <div class="register-header">
      <span class="logo-icon">🏥</span>
      <h1>Create Account</h1>
      <p>Fill in your details to get started</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" [(ngModel)]="phone" name="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Min 8 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Repeat password" required>
        </div>
      </div>
      <div class="error-msg" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>
      <button type="submit" class="btn-register" [disabled]="isLoading">
         {{ isLoading ? 'Creating Account...' : 'Create Account →' }}
      </button>
    </form>

    <p class="login-link">
      Already have an account?
      <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
