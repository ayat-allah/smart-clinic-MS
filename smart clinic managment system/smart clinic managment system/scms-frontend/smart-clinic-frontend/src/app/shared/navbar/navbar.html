<nav class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
    <div class="navbar-logo">
      <span class="logo-icon">🏥</span>
      <span class="logo-text">Smart <span class="accent">Clinic</span></span>
    </div>

    <!-- Desktop Menu -->
    <ul class="navbar-links">
      <li>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      </li>

      <ng-container *ngIf="!authService.isLoggedIn()">
        <li><a routerLink="/login">Log in</a></li>
        <li><a routerLink="/register" class="btn-register">Create Account</a></li>
      </ng-container>

      <ng-container *ngIf="authService.isLoggedIn()">
        <li><a (click)="logout()" class="btn-logout" style="cursor:pointer">Log out</a></li>
      </ng-container>
    </ul>

    <!-- Mobile Toggle -->
    <button class="menu-toggle" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMenuOpen">
    <a routerLink="/" (click)="toggleMenu()">Home</a>

    <ng-container *ngIf="!authService.isLoggedIn()">
      <a routerLink="/login" (click)="toggleMenu()">Log in</a>
      <a routerLink="/register" (click)="toggleMenu()" class="mobile-register">Create Account</a>
    </ng-container>

    <ng-container *ngIf="authService.isLoggedIn()">
      <a (click)="logout(); toggleMenu()" class="mobile-logout" style="cursor:pointer">Log out</a>
    </ng-container>
  </div>

</nav>
